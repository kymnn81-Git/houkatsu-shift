<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シフト希望管理システム</title>
<style>
:root {
  --color-good: #d4edda;
  --color-ok: #fff3cd;
  --color-bad: #e8e8e8;
  --color-weekend: #e8e8e8;
  --color-assigned: #fff3cd;
  --border-color: #ccc;
}

* {
  box-sizing: border-box;
}

body {
  font-family: 'Hiragino Sans', 'Meiryo', sans-serif;
  margin: 0;
  padding: 10px;
  background: #fafafa;
  font-size: 14px;
}

.no-print {
  display: block;
}

h1 {
  font-size: 1.5rem;
  margin: 0 0 10px;
}

.controls {
  margin-bottom: 15px;
  padding: 10px;
  background: white;
  border: 1px solid #ddd;
  border-radius: 4px;
}

.controls button {
  margin: 3px;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid #007bff;
  background: #007bff;
  color: white;
  border-radius: 3px;
}

.controls button:hover {
  background: #0056b3;
}

.controls button.primary {
  background: #28a745;
  border-color: #28a745;
}

.controls button.primary:hover {
  background: #218838;
}

.controls button.secondary {
  background: #6c757d;
  border-color: #6c757d;
}

.controls button.secondary:hover {
  background: #545b62;
}

.controls button.danger {
  background: #dc3545;
  border-color: #dc3545;
}

.controls button.danger:hover {
  background: #c82333;
}

.month-nav {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.month-nav h2 {
  margin: 0;
  font-size: 1.3rem;
}

.member-mgmt {
  margin: 10px 0;
}

.member-input-group {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
  flex-wrap: wrap;
}

.member-input-group input[type="text"] {
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 3px;
  font-size: 13px;
  flex: 1;
  min-width: 150px;
}

.member-input-group input[type="date"] {
  padding: 8px;
  border: 1px solid #ddd;
  border-radius: 3px;
  font-size: 13px;
}

.member-list {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 5px;
}

.member-item {
  display: flex;
  align-items: center;
  background: #e9ecef;
  padding: 5px 8px;
  border-radius: 3px;
  font-size: 12px;
}

.member-item button {
  margin-left: 5px;
  padding: 2px 6px;
  font-size: 11px;
  cursor: pointer;
  border: none;
  background: #dc3545;
  color: white;
  border-radius: 2px;
  transition: background 0.2s;
}

.member-item button:hover {
  background: #c82333;
  transform: scale(1.1);
}

.totals-display {
  margin: 10px 0;
  padding: 10px;
  background: #f8f9fa;
  border-radius: 4px;
  font-size: 12px;
}

.count-table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  font-size: 13px;
}

.count-table th,
.count-table td {
  border: 1px solid #ddd;
  padding: 8px;
  text-align: center;
}

.count-table th {
  background: #007bff;
  color: white;
  font-weight: bold;
  padding: 10px 8px;
}

.count-table thead tr:first-child th {
  background: #007bff;
}

.count-table thead tr:last-child th:nth-child(1),
.count-table thead tr:last-child th:nth-child(2),
.count-table thead tr:last-child th:nth-child(3) {
  background: #42a5f5;
}

.count-table thead tr:last-child th:nth-child(4),
.count-table thead tr:last-child th:nth-child(5),
.count-table thead tr:last-child th:nth-child(6) {
  background: #1976d2;
}

.count-table tbody tr:nth-child(even) {
  background: #f8f9fa;
}

.count-table tbody tr:hover {
  background: #e9ecef;
}

.totals-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px;
}

.total-item {
  padding: 5px;
  background: white;
  border-radius: 3px;
  border: 1px solid #dee2e6;
}

.total-item strong {
  color: #007bff;
}

.sync-status {
  position: fixed;
  top: 10px;
  right: 10px;
  padding: 5px 10px;
  background: #28a745;
  color: white;
  border-radius: 3px;
  font-size: 12px;
  z-index: 1000;
}

.sync-status.syncing {
  background: #ffc107;
}

.sync-status.error {
  background: #dc3545;
}

.calendar-container {
  overflow-x: auto;
  overflow-y: auto;
  margin: 15px 0;
  max-height: 70vh;
  position: relative;
  border: 1px solid var(--border-color);
}

.calendar {
  border-collapse: collapse;
  width: 100%;
  min-width: 700px;
  background: white;
  font-size: 13px;
}

.calendar th, .calendar td {
  border: 1px solid var(--border-color);
  padding: 4px;
  text-align: center;
  font-weight: normal;
  vertical-align: middle;
  min-width: 60px;
}

.calendar thead th {
  position: sticky;
  top: 0;
  background: #007bff;
  color: white;
  z-index: 10;
  font-weight: bold;
}

/* 日付列固定 */
.calendar td:first-child,
.calendar th:first-child {
  position: sticky;
  left: 0;
  background: white;
  z-index: 5;
  font-weight: bold;
  min-width: 35px;
  max-width: 35px;
  font-size: 11px;
}

.calendar td:first-child.weekend-bg {
  background: #e8e8e8 !important;
}

.calendar thead th:first-child {
  z-index: 11;
  background: #007bff;
}

/* AM/PM列固定 */
.calendar tbody td:nth-child(2) {
  position: sticky;
  left: 35px;
  background: white;
  z-index: 5;
  font-weight: bold;
  min-width: 30px;
  max-width: 30px;
  font-size: 11px;
}

/* PM時間セル（rowSpanのため、nth-child(1)になる） */
.calendar tbody td.pm-time-cell {
  position: sticky;
  left: 35px;
  background: white;
  z-index: 5;
  font-weight: bold;
  min-width: 30px;
  max-width: 30px;
  font-size: 11px;
}

.calendar tbody td.pm-time-cell.weekend-bg {
  background: #e8e8e8;
}

.calendar thead th:nth-child(2) {
  position: sticky;
  left: 35px;
  z-index: 11;
  background: #007bff;
  min-width: 30px;
  max-width: 30px;
}

/* 担当者列固定 */
.calendar tbody td:nth-child(3) {
  position: sticky;
  left: 65px;
  background: #ffe6f0;
  z-index: 5;
  font-weight: bold;
  min-width: 70px;
  font-size: 16px;
}

/* PM担当セル（rowSpanのため、nth-child(2)になる） */
.calendar tbody td.pm-assigned-cell {
  position: sticky;
  left: 65px;
  background: #ffe6f0;
  z-index: 5;
  font-weight: bold;
  min-width: 70px;
  font-size: 16px;
}

.calendar tbody td.pm-assigned-cell.weekend-bg {
  background: #e8e8e8 !important;
}

.calendar thead th:nth-child(3) {
  position: sticky;
  left: 65px;
  z-index: 11;
  background: #007bff;
  min-width: 70px;
}

/* 休日行の担当列 */
.calendar tbody td:nth-child(3).weekend-bg {
  background: #e8e8e8 !important;
}

/* バックアップ担当列固定 */
.calendar tbody td:nth-child(4) {
  position: sticky;
  left: 135px;
  background: #d0e8ff;
  z-index: 5;
  font-weight: bold;
  min-width: 70px;
  font-size: 16px;
}

/* PMバックアップ担当セル（rowSpanのため、nth-child(3)になる） */
.calendar tbody td.pm-backup-assigned-cell {
  position: sticky;
  left: 135px;
  background: #d0e8ff;
  z-index: 5;
  font-weight: bold;
  min-width: 70px;
  font-size: 16px;
}

.calendar tbody td.pm-backup-assigned-cell.weekend-bg {
  background: #e8e8e8 !important;
}

.calendar thead th:nth-child(4) {
  position: sticky;
  left: 135px;
  z-index: 11;
  background: #007bff;
  min-width: 70px;
}

/* 休日行のバックアップ担当列 */
.calendar tbody td:nth-child(4).weekend-bg {
  background: #e8e8e8 !important;
}

/* 5列目以降のシフトセルは通常のスタイル */
.calendar tbody td:nth-child(n+5) {
  position: static;
  z-index: auto;
  background: white !important;
  font-weight: normal !important;
}

/* PM行のシフトセル */
.calendar tbody td.pm-shift-cell {
  position: static;
  z-index: auto;
  background: white !important;
  font-weight: normal !important;
}

/* 担当セルのselect要素 */
.assigned-cell {
  background: #ffe6f0;
}

.assigned-cell select {
  width: 100%;
  padding: 4px 2px;
  font-size: 14px;
  border: 1px solid #ffb3d9;
  border-radius: 3px;
  background: #ffe6f0;
}

.assigned-cell.weekend-bg {
  background: #e8e8e8 !important;
}

.assigned-cell.weekend-bg select {
  background: #e8e8e8;
  border-color: #ccc;
}

/* バックアップ担当セルのselect要素 */
.backup-assigned-cell {
  background: #d0e8ff;
}

.backup-assigned-cell select {
  width: 100%;
  padding: 4px 2px;
  font-size: 14px;
  border: 1px solid #99ccff;
  border-radius: 3px;
  background: white;
}

.backup-assigned-cell.weekend-bg {
  background: #e8e8e8 !important;
}

.backup-assigned-cell.weekend-bg select {
  background: #e8e8e8;
  border-color: #ccc;
}

.assigned-cell select {
  width: 100%;
  padding: 4px 2px;
  font-size: 14px;
  border: 1px solid #ddd;
  border-radius: 3px;
  background: white;
  font-weight: bold;
}

.weekend-bg {
  background-color: var(--color-weekend) !important;
}

.shift-cell {
  padding: 8px 4px;
  cursor: pointer;
  transition: all 0.1s;
  min-height: 35px;
  user-select: none;
  font-weight: normal !important;
  background: white;
}

.pm-shift-cell {
  font-weight: normal !important;
}

.shift-cell:hover {
  transform: scale(1.05);
  box-shadow: 0 0 0 2px #007bff;
  z-index: 1;
}

.shift-cell:active {
  transform: scale(0.95);
}

/* 平日のシフトセル色 - 最高優先順位 */
table.calendar tbody td.shift-cell.good,
table.calendar tbody td.pm-shift-cell.good {
  background-color: #d4edda !important;
}

table.calendar tbody td.shift-cell.ok,
table.calendar tbody td.pm-shift-cell.ok {
  background-color: #fff3cd !important;
}

table.calendar tbody td.shift-cell.bad,
table.calendar tbody td.pm-shift-cell.bad {
  background-color: #e8e8e8 !important;
}

/* 休日のシフトセル - 全てグレー（記号に関係なく） */
table.calendar tbody td.shift-cell.weekend-bg,
table.calendar tbody td.pm-shift-cell.weekend-bg {
  background-color: #e8e8e8 !important;
}

.assigned-cell select {
  width: 100%;
  padding: 4px 2px;
  font-size: 14px;
  border: 1px solid #ddd;
  border-radius: 3px;
  background: white;
  font-weight: bold;
}

.login-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.login-box {
  background: white;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  width: 100%;
  max-width: 400px;
}

.login-box h1 {
  text-align: center;
  color: #333;
  margin-bottom: 30px;
}

.login-box input {
  width: 100%;
  padding: 12px;
  margin-bottom: 20px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 14px;
}

.login-box button {
  width: 100%;
  padding: 12px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
}

.login-box button:hover {
  background: #0056b3;
}

.error-message {
  color: #dc3545;
  text-align: center;
  margin-top: 10px;
  font-size: 14px;
}

@media print {
  body {
    background: white;
    padding: 0;
  }

  .no-print {
    display: none !important;
  }

  .calendar-container {
    overflow: visible;
    max-height: none;
    border: none;
  }

  .calendar {
    font-size: 10px;
  }

  .calendar th, .calendar td {
    padding: 2px;
    min-width: auto;
  }

  .calendar th,
  .calendar td {
    position: static !important;
  }

  .sync-status {
    display: none;
  }
}

@media (max-width: 768px) {
  .calendar {
    font-size: 11px;
  }
  
  .calendar th, .calendar td {
    padding: 3px;
    min-width: 50px;
  }

  .controls button {
    font-size: 12px;
    padding: 6px 10px;
  }
}

/* === 最優先色設定（最後に記述） === */
/* 5列目以降のメンバー列 - 確実に白背景 */
table.calendar tbody tr td:nth-child(n+5) {
  background-color: white !important;
}

/* 5列目以降 - ○△×がない場合は白 */
table.calendar tbody tr td:nth-child(n+5):not(.good):not(.ok):not(.bad):not(.weekend-bg) {
  background-color: white !important;
}

/* PM行の5列目以降のメンバー列 - 確実に白背景 */
table.calendar tbody tr td.pm-shift-cell {
  background-color: white !important;
}

table.calendar tbody tr td.pm-shift-cell:not(.good):not(.ok):not(.bad):not(.weekend-bg) {
  background-color: white !important;
}

/* 平日 - ○：緑色 */
table.calendar tbody tr td.shift-cell.good:not(.weekend-bg),
table.calendar tbody tr td.pm-shift-cell.good:not(.weekend-bg),
table.calendar tbody tr td:nth-child(n+5).good:not(.weekend-bg) {
  background-color: #d4edda !important;
}

/* 平日 - △：黄色 */
table.calendar tbody tr td.shift-cell.ok:not(.weekend-bg),
table.calendar tbody tr td.pm-shift-cell.ok:not(.weekend-bg),
table.calendar tbody tr td:nth-child(n+5).ok:not(.weekend-bg) {
  background-color: #fff3cd !important;
}

/* 平日 - ×：グレー */
table.calendar tbody tr td.shift-cell.bad:not(.weekend-bg),
table.calendar tbody tr td.pm-shift-cell.bad:not(.weekend-bg),
table.calendar tbody tr td:nth-child(n+5).bad:not(.weekend-bg) {
  background-color: #e8e8e8 !important;
}

/* 休日 - 全列グレー（記号に関係なく、最優先） */
table.calendar tbody tr td.weekend-bg {
  background-color: #e8e8e8 !important;
}

table.calendar tbody tr td:nth-child(n+5).weekend-bg,
table.calendar tbody tr td.shift-cell.weekend-bg,
table.calendar tbody tr td.pm-shift-cell.weekend-bg {
  background-color: #e8e8e8 !important;
}

</style>
</head>
<body>

<div id="loginScreen" class="login-container">
  <div class="login-box">
    <h1>🗓️ シフト管理システム</h1>
    <p style="color: #666; margin-bottom: 20px;">登録されたメールアドレスでログインしてください</p>
    <input type="email" id="emailInput" placeholder="メールアドレス" style="margin-bottom: 10px;">
    <input type="password" id="passwordInput" placeholder="パスワード" onkeypress="if(event.key==='Enter') loginWithEmail()">
    <button onclick="loginWithEmail()">ログイン</button>
    <div id="loginError" class="error-message"></div>
  </div>
</div>

<div id="mainScreen" style="display: none;">
  <div class="no-print">
    <h1>📋 包括同意シフト</h1>
    
    <div id="syncStatus" class="sync-status">✓ 同期済み</div>

    <div class="controls">
      <div class="month-nav">
        <div style="margin-bottom: 10px;">
          <label for="fiscalYearSelect" style="font-weight: bold; margin-right: 10px;">年度:</label>
          <select id="fiscalYearSelect" onchange="changeFiscalYear()" style="font-size: 16px; padding: 5px 10px; border-radius: 5px; border: 1px solid #ddd;">
            <option value="2025">2025年度（2025/4〜2026/3）</option>
            <option value="2026">2026年度（2026/4〜2027/3）</option>
            <option value="2027">2027年度（2027/4〜2028/3）</option>
            <option value="2028">2028年度（2028/4〜2029/3）</option>
            <option value="2029">2029年度（2029/4〜2030/3）</option>
            <option value="2030">2030年度（2030/4〜2031/3）</option>
          </select>
        </div>
        <button onclick="changeMonth(-1)">◀前月</button>
        <button onclick="changeMonth(0)">今月</button>
        <button onclick="changeMonth(1)">次月▶</button>
        <h2 id="currentMonth"></h2>
        <button onclick="logout()" class="danger">ログアウト</button>
      </div>

      <div style="margin-top: 10px;">
        <button onclick="manualSave()" class="primary">💾 保存</button>
        <button onclick="autoAssign()">🎯 未割当を自動割り振り（今月）</button>
        <button onclick="copyScheduleToClipboard()" class="secondary">📧 担当表をコピー</button>
        <button onclick="window.print()" class="secondary">🖨️ 印刷</button>
        <button onclick="migrateTo2025()" class="primary" style="background: #28a745;">🔄 既存データを2025年度に移行</button>
        <button onclick="resetData()" class="danger">🗑️ データリセット</button>
      </div>
    </div>
  </div>

  <div class="no-print" style="text-align: right; margin: 10px 20px 5px; font-size: 13px; color: #555;">
    <strong>【記号の意味】</strong>
    <span style="margin-left: 15px; color: #155724; font-weight: bold;">○ 可</span>
    <span style="margin-left: 15px; color: #856404; font-weight: bold;">△ バックアップ可</span>
    <span style="margin-left: 15px; color: #721c24; font-weight: bold;">× 不可</span>
  </div>

  <div class="calendar-container">
    <table class="calendar" id="calendar">
      <thead>
        <tr id="headerRow">
          <th>日付</th>
          <th>時間</th>
          <th>担当</th>
        </tr>
      </thead>
      <tbody id="calendarBody">
      </tbody>
    </table>
  </div>

  <div class="no-print" style="text-align: center; margin: 10px 0; color: #666; font-size: 12px;">
    データはFirebaseでリアルタイム同期されます
  </div>

  <div class="no-print">
    <div class="totals-display">
      <strong>📊 月間・累計カウント：</strong>
      <div style="overflow-x: auto; margin-top: 10px;">
        <table id="countTable" class="count-table">
          <thead>
            <tr>
              <th rowspan="2">メンバー</th>
              <th colspan="4">今月</th>
              <th colspan="4">累計</th>
            </tr>
            <tr>
              <th>AM</th>
              <th>PM</th>
              <th>合計</th>
              <th>バックアップ</th>
              <th>AM</th>
              <th>PM</th>
              <th>合計</th>
              <th>バックアップ</th>
            </tr>
          </thead>
          <tbody id="countTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="controls">
      <div class="member-mgmt">
        <strong>メンバー管理：</strong>
        <div class="member-input-group">
          <input type="text" id="newMemberName" placeholder="新しいメンバー名" onkeypress="if(event.key==='Enter') addMember()">
          <button onclick="addMember()">メンバー追加</button>
          <button onclick="showDeleteMemberDialog()" class="danger">メンバー削除</button>
        </div>
        <div id="memberList" class="member-list"></div>
      </div>

      <div class="member-mgmt">
        <strong>休日管理：</strong>
        <div class="member-input-group">
          <input type="date" id="newHolidayDate">
          <button onclick="addCustomHoliday()">休日追加</button>
        </div>
        <div id="holidayList" class="member-list"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getDatabase, ref, set, get, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyAkzXox90kJgOUcy3e35ZhCZLBwNLkF8OA",
  authDomain: "houkatsu-shift.firebaseapp.com",
  databaseURL: "https://houkatsu-shift-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "houkatsu-shift",
  storageBucket: "houkatsu-shift.firebasestorage.app",
  messagingSenderId: "955065680563",
  appId: "1:955065680563:web:d02ac6cbc6ac7af771a6c6",
  measurementId: "G-52Z070XLD6"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);
const firebaseAuth = getAuth(app);

// メール/パスワードでログイン
window.loginWithEmail = async function() {
  const email = document.getElementById('emailInput').value;
  const password = document.getElementById('passwordInput').value;
  const errorDiv = document.getElementById('loginError');
  
  if (!email || !password) {
    errorDiv.textContent = 'メールアドレスとパスワードを入力してください';
    return;
  }
  
  try {
    await signInWithEmailAndPassword(firebaseAuth, email, password);
    console.log('✅ ログイン成功');
    errorDiv.textContent = '';
  } catch (error) {
    console.error('❌ ログインエラー:', error);
    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
      errorDiv.textContent = 'メールアドレスまたはパスワードが正しくありません';
    } else if (error.code === 'auth/invalid-email') {
      errorDiv.textContent = 'メールアドレスの形式が正しくありません';
    } else {
      errorDiv.textContent = 'ログインに失敗しました: ' + error.message;
    }
  }
};

// 年度の計算（4月始まり）
function getFiscalYear(year, month) {
  if (month >= 4) {
    return year; // 4-12月 → その年の年度
  } else {
    return year - 1; // 1-3月 → 前年の年度
  }
}

async function initApp() {
  // 年度選択の初期値を設定
  document.getElementById('fiscalYearSelect').value = currentFiscalYear.toString();
  
  await loadData();
  setupRealtimeListeners();
  renderCalendar();
  renderMemberList();
  renderHolidayList();
  updateCountTable();
  
  // 初期化完了後、同期済みステータスを確実に設定
  setTimeout(() => {
    updateSyncStatus('success');
  }, 1000);
}

async function loadData() {
  try {
    const snapshot = await get(ref(database, `/${currentFiscalYear}`));
    const data = snapshot.val() || {};
    
    if (data.members && data.members.length > 0) {
      members = data.members;
    } else {
      // 新年度でメンバーが未設定の場合、前年度からコピーするか確認
      members = ["竹本", "村松", "冨樫", "米村", "大原", "大橋", "野々垣", "大川", "後閑", "内藤", "吉田", "藤井", "山崎"];
    }
    shiftData = data.shiftData || {};
    assignedData = data.assignedData || {};
    backupAssignedData = data.backupAssignedData || {};
    yearlyTotals = data.yearlyTotals || {};
    customHolidays = data.customHolidays || [];

    console.log(`📥 ${currentFiscalYear}年度データ読み込み完了`, {members: members.length});
  } catch (error) {
    console.error('❌ データ読み込みエラー:', error);
  }
}

async function saveData() {
  try {
    console.log(`💾 ${currentFiscalYear}年度データ保存開始...`);
    updateSyncStatus('syncing');
    
    console.log('📊 保存するデータ:', {
      fiscalYear: currentFiscalYear,
      members: members.length,
      shiftData: Object.keys(shiftData).length,
      assignedData: Object.keys(assignedData).length,
      backupAssignedData: Object.keys(backupAssignedData).length,
      yearlyTotals: Object.keys(yearlyTotals).length,
      customHolidays: customHolidays.length
    });
    
    const startTime = Date.now();
    
    await set(ref(database, `/${currentFiscalYear}`), {
      members,
      shiftData,
      assignedData,
      backupAssignedData,
      yearlyTotals,
      customHolidays
    });
    
    const elapsed = Date.now() - startTime;
    console.log(`✅ ${currentFiscalYear}年度データ保存完了 (${elapsed}ms)`);
    
    // 保存完了後すぐに同期済みに戻す
    setTimeout(() => {
      updateSyncStatus('success');
    }, 500);
    
  } catch (error) {
    console.error('❌ データ保存エラー:', error);
    console.error('エラー詳細:', error.message);
    console.error('エラーコード:', error.code);
    updateSyncStatus('error');
    alert('保存エラー: ' + error.message);
    
    // エラーでも2秒後に「同期済み」に戻す
    setTimeout(() => {
      updateSyncStatus('success');
    }, 2000);
  }
}

let updateTimeout = null;

function setupRealtimeListeners() {
  console.log(`👂 ${currentFiscalYear}年度のリアルタイムリスナーを設定中...`);
  
  // 既存のリスナーがあれば解除
  if (realtimeUnsubscribe) {
    console.log('🔌 既存のリスナーを解除');
    realtimeUnsubscribe();
  }
  
  // 新しいリスナーを設定
  realtimeUnsubscribe = onValue(ref(database, `/${currentFiscalYear}`), (snapshot) => {
    console.log(`📡 ${currentFiscalYear}年度のデータ受信`);
    
    // 既存の更新タイマーをクリア
    if (updateTimeout) {
      clearTimeout(updateTimeout);
    }
    
    // 300ms後に更新（連続した更新を防ぐ）
    updateTimeout = setTimeout(() => {
      const data = snapshot.val() || {};
      console.log('🔄 リアルタイム更新開始', {
        fiscalYear: currentFiscalYear,
        members: data.members?.length || 0,
        shiftData: Object.keys(data.shiftData || {}).length,
        assignedData: Object.keys(data.assignedData || {}).length,
        backupAssignedData: Object.keys(data.backupAssignedData || {}).length
      });
      
      if (data.members && data.members.length > 0) {
        members = data.members;
      }
      shiftData = data.shiftData || {};
      assignedData = data.assignedData || {};
      backupAssignedData = data.backupAssignedData || {};
      yearlyTotals = data.yearlyTotals || {};
      customHolidays = data.customHolidays || [];
      
      renderCalendar();
      renderMemberList();
      renderHolidayList();
      updateCountTable();
      console.log('✅ リアルタイム更新完了');
    }, 300);
  }, (error) => {
    console.error('❌ リアルタイムリスナーエラー:', error);
    console.error('エラー詳細:', error.message);
    alert('Firebase接続エラー: ' + error.message);
  });
}

function updateSyncStatus(status) {
  const statusEl = document.getElementById('syncStatus');
  statusEl.className = 'sync-status';
  
  switch(status) {
    case 'syncing':
      statusEl.textContent = '⟳ 同期中...';
      statusEl.classList.add('syncing');
      break;
    case 'success':
      statusEl.textContent = '✓ 同期済み';
      break;
    case 'error':
      statusEl.textContent = '✗ エラー';
      statusEl.classList.add('error');
      break;
  }
}

window.addMember = async function() {
  const input = document.getElementById('newMemberName');
  const name = input.value.trim();
  
  if (!name) {
    alert('メンバー名を入力してください');
    return;
  }
  
  if (members.includes(name)) {
    alert('このメンバーは既に登録されています');
    return;
  }
  
  members.push(name);
  input.value = '';
  
  if (!yearlyTotals[name]) {
    yearlyTotals[name] = { am: 0, pm: 0 };
  }
  
  await saveData();
};

window.removeMember = async function(name) {
  console.log('🗑️ メンバー削除開始:', name);
  
  if (!confirm(`${name} を削除しますか？\nこのメンバーのシフトデータもすべて削除されます。`)) {
    console.log('キャンセルされました');
    return;
  }
  
  console.log('削除前のメンバー:', members);
  
  members = members.filter(m => m !== name);
  
  console.log('削除後のメンバー:', members);
  
  // シフトデータの削除
  let deletedShifts = 0;
  Object.keys(shiftData).forEach(key => {
    if (key.includes(`_${name}_`)) {
      delete shiftData[key];
      deletedShifts++;
    }
  });
  
  console.log(`シフトデータ削除: ${deletedShifts}件`);
  
  // 担当データの削除
  let deletedAssignments = 0;
  Object.keys(assignedData).forEach(key => {
    if (assignedData[key] === name) {
      delete assignedData[key];
      deletedAssignments++;
    }
  });
  
  console.log(`担当データ削除: ${deletedAssignments}件`);
  
  // バックアップ担当データの削除
  let deletedBackupAssignments = 0;
  Object.keys(backupAssignedData).forEach(key => {
    if (backupAssignedData[key] === name) {
      delete backupAssignedData[key];
      deletedBackupAssignments++;
    }
  });
  
  console.log(`バックアップ担当データ削除: ${deletedBackupAssignments}件`);
  
  // 累計データの削除
  if (yearlyTotals[name]) {
    delete yearlyTotals[name];
    console.log('累計データ削除');
  }
  
  // データを保存
  await saveData();
  
  // UIを強制的に更新
  renderCalendar();
  renderMemberList();
  updateCountTable();
  
  console.log('✅ メンバー削除完了:', name);
  alert(`${name} を削除しました`);
};

window.changeMonth = function(delta) {
  if (delta === 0) {
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth() + 1;
  } else {
    currentMonth += delta;
    if (currentMonth > 12) {
      currentMonth = 1;
      currentYear++;
    } else if (currentMonth < 1) {
      currentMonth = 12;
      currentYear--;
    }
  }
  
  // 月が変わったので年度も再計算
  const newFiscalYear = getFiscalYear(currentYear, currentMonth);
  if (newFiscalYear !== currentFiscalYear) {
    // 年度が変わった場合、データを読み込み直す
    currentFiscalYear = newFiscalYear;
    document.getElementById('fiscalYearSelect').value = currentFiscalYear.toString();
    loadData().then(() => {
      setupRealtimeListeners(); // リアルタイムリスナーを再設定
      renderCalendar();
      renderMemberList();
      renderHolidayList();
      updateCountTable();
    });
  } else {
    renderCalendar();
    updateCountTable();
  }
};

window.changeFiscalYear = async function() {
  const selectedYear = parseInt(document.getElementById('fiscalYearSelect').value);
  
  if (selectedYear === currentFiscalYear) {
    return; // 変更なし
  }
  
  if (!confirm(`${selectedYear}年度に切り替えますか？\n現在の編集内容は保存されます。`)) {
    // キャンセルされたら選択を戻す
    document.getElementById('fiscalYearSelect').value = currentFiscalYear.toString();
    return;
  }
  
  // 現在のデータを保存
  await saveData();
  
  // 年度を切り替え
  currentFiscalYear = selectedYear;
  
  // 表示月をその年度の4月に変更
  currentYear = selectedYear;
  currentMonth = 4;
  
  // 新しい年度のデータを読み込み
  await loadData();
  
  // リアルタイムリスナーを再設定
  setupRealtimeListeners();
  
  // 画面を再描画
  renderCalendar();
  renderMemberList();
  renderHolidayList();
  updateCountTable();
  
  console.log(`✅ ${currentFiscalYear}年度に切り替えました`);
};

function renderCalendar() {
  document.getElementById('currentMonth').textContent = `${currentYear}年${currentMonth}月`;
  
  const headerRow = document.getElementById('headerRow');
  headerRow.innerHTML = '<th>日付</th><th>時間</th><th>担当</th><th>バックアップ担当</th>';
  members.forEach(name => {
    headerRow.innerHTML += `<th>${name}</th>`;
  });
  
  const tbody = document.getElementById('calendarBody');
  tbody.innerHTML = '';
  
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  
  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(currentYear, currentMonth - 1, day);
    const dayOfWeek = date.getDay();
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const weekDayNames = ['日', '月', '火', '水', '木', '金', '土'];
    
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const isHoliday = holidays[dateStr] || customHolidays.includes(dateStr);
    const bgClass = (isWeekend || isHoliday) ? 'weekend-bg' : '';
    
    // AM行
    const amRow = document.createElement('tr');
    
    // 日付セル
    const dateCell = document.createElement('td');
    dateCell.className = bgClass;
    dateCell.rowSpan = 2;
    dateCell.style.fontSize = '11px';
    dateCell.style.lineHeight = '1.2';
    dateCell.innerHTML = `${day}<br>(${weekDayNames[dayOfWeek]})`;
    amRow.appendChild(dateCell);
    
    // AM時間セル
    const amTimeCell = document.createElement('td');
    amTimeCell.className = bgClass;
    amTimeCell.textContent = 'AM';
    amRow.appendChild(amTimeCell);
    
    // AM担当セル
    const amAssignCell = document.createElement('td');
    amAssignCell.className = `assigned-cell ${bgClass}`;
    const amSelect = document.createElement('select');
    amSelect.innerHTML = '<option value="">-</option>' + members.map(m => 
      `<option value="${m}" ${assignedData[dateStr + '_am'] === m ? 'selected' : ''}>${m}</option>`
    ).join('');
    amSelect.addEventListener('change', async function() {
      await updateAssigned(dateStr, 'am', this.value);
    });
    amAssignCell.appendChild(amSelect);
    amRow.appendChild(amAssignCell);
    
    // AMバックアップ担当セル
    const amBackupAssignCell = document.createElement('td');
    amBackupAssignCell.className = `backup-assigned-cell ${bgClass}`;
    const amBackupSelect = document.createElement('select');
    amBackupSelect.innerHTML = '<option value="">-</option>' + members.map(m => 
      `<option value="${m}" ${backupAssignedData[dateStr + '_am'] === m ? 'selected' : ''}>${m}</option>`
    ).join('');
    amBackupSelect.addEventListener('change', async function() {
      await updateBackupAssigned(dateStr, 'am', this.value);
    });
    amBackupAssignCell.appendChild(amBackupSelect);
    amRow.appendChild(amBackupAssignCell);
    
    // AMシフト希望セル
    members.forEach(name => {
      const key = `${dateStr}_${name}_am`;
      const value = shiftData[key] || '';
      const cellClass = value === '○' ? 'good' : value === '△' ? 'ok' : value === '×' ? 'bad' : '';
      
      const td = document.createElement('td');
      td.className = `shift-cell ${cellClass} ${bgClass}`;
      td.textContent = value || '-';
      
      td.setAttribute('data-date', dateStr);
      td.setAttribute('data-name', name);
      td.setAttribute('data-period', 'am');
      td.onclick = function() {
        toggleShift(dateStr, name, 'am');
      };
      amRow.appendChild(td);
    });
    
    // PM行
    const pmRow = document.createElement('tr');
    
    // PM時間セル
    const pmTimeCell = document.createElement('td');
    pmTimeCell.className = `pm-time-cell ${bgClass}`;
    pmTimeCell.textContent = 'PM';
    pmRow.appendChild(pmTimeCell);
    
    // PM担当セル
    const pmAssignCell = document.createElement('td');
    pmAssignCell.className = `assigned-cell pm-assigned-cell ${bgClass}`;
    const pmSelect = document.createElement('select');
    pmSelect.innerHTML = '<option value="">-</option>' + members.map(m => 
      `<option value="${m}" ${assignedData[dateStr + '_pm'] === m ? 'selected' : ''}>${m}</option>`
    ).join('');
    pmSelect.addEventListener('change', async function() {
      await updateAssigned(dateStr, 'pm', this.value);
    });
    pmAssignCell.appendChild(pmSelect);
    pmRow.appendChild(pmAssignCell);
    
    // PMバックアップ担当セル
    const pmBackupAssignCell = document.createElement('td');
    pmBackupAssignCell.className = `backup-assigned-cell pm-backup-assigned-cell ${bgClass}`;
    const pmBackupSelect = document.createElement('select');
    pmBackupSelect.innerHTML = '<option value="">-</option>' + members.map(m => 
      `<option value="${m}" ${backupAssignedData[dateStr + '_pm'] === m ? 'selected' : ''}>${m}</option>`
    ).join('');
    pmBackupSelect.addEventListener('change', async function() {
      await updateBackupAssigned(dateStr, 'pm', this.value);
    });
    pmBackupAssignCell.appendChild(pmBackupSelect);
    pmRow.appendChild(pmBackupAssignCell);
    
    // PMシフト希望セル
    members.forEach(name => {
      const key = `${dateStr}_${name}_pm`;
      const value = shiftData[key] || '';
      const cellClass = value === '○' ? 'good' : value === '△' ? 'ok' : value === '×' ? 'bad' : '';
      
      const td = document.createElement('td');
      td.className = `shift-cell pm-shift-cell ${cellClass} ${bgClass}`;
      td.textContent = value || '-';
      
      td.setAttribute('data-date', dateStr);
      td.setAttribute('data-name', name);
      td.setAttribute('data-period', 'pm');
      td.onclick = function() {
        toggleShift(dateStr, name, 'pm');
      };
      pmRow.appendChild(td);
    });
    
    tbody.appendChild(amRow);
    tbody.appendChild(pmRow);
  }
  
  console.log('✅ カレンダー描画完了');
}

let toggleTimeout = null;

async function toggleShift(date, member, period) {
  // 連続クリックを防ぐ
  if (toggleTimeout) {
    clearTimeout(toggleTimeout);
  }
  
  const key = `${date}_${member}_${period}`;
  const current = shiftData[key] || '';
  
  const nextValue = current === '' ? '○' : current === '○' ? '△' : current === '△' ? '×' : '';
  
  if (nextValue === '') {
    delete shiftData[key];
  } else {
    shiftData[key] = nextValue;
  }
  
  console.log(`シフト更新: ${date} ${member} ${period} → ${nextValue || '空白'}`);
  
  // 即座にUIを更新
  renderCalendar();
  
  // 500ms後に保存
  toggleTimeout = setTimeout(async () => {
    await saveData();
  }, 500);
}

async function updateAssigned(date, period, newAssigned) {
  const key = `${date}_${period}`;
  const oldAssigned = assignedData[key];
  
  if (oldAssigned && yearlyTotals[oldAssigned]) {
    yearlyTotals[oldAssigned][period] = Math.max(0, yearlyTotals[oldAssigned][period] - 1);
  }
  
  if (newAssigned) {
    assignedData[key] = newAssigned;
    if (!yearlyTotals[newAssigned]) {
      yearlyTotals[newAssigned] = { am: 0, pm: 0 };
    }
    yearlyTotals[newAssigned][period]++;
  } else {
    delete assignedData[key];
  }
  
  await saveData();
  updateCountTable();
}

async function updateBackupAssigned(date, period, newBackupAssigned) {
  const key = `${date}_${period}`;
  
  if (newBackupAssigned) {
    backupAssignedData[key] = newBackupAssigned;
  } else {
    delete backupAssignedData[key];
  }
  
  await saveData();
  renderCalendar();
}

window.autoAssign = async function() {
  if (!confirm('今月の未割当日を自動的に割り振りますか？\n※土日・祝日はスキップします\n※バックアップ担当も自動割り振りします')) return;
  
  console.log('🎯 自動割り振り開始');
  console.log(`対象月: ${currentYear}年${currentMonth}月`);
  console.log(`メンバー数: ${members.length}`);
  
  // 今月の既存割り当てをカウント
  const monthlyCount = {};
  members.forEach(name => {
    monthlyCount[name] = { am: 0, pm: 0 };
  });
  
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    
    const amAssigned = assignedData[dateStr + '_am'];
    const pmAssigned = assignedData[dateStr + '_pm'];
    
    if (amAssigned && monthlyCount[amAssigned]) {
      monthlyCount[amAssigned].am++;
    }
    if (pmAssigned && monthlyCount[pmAssigned]) {
      monthlyCount[pmAssigned].pm++;
    }
  }
  
  console.log('📊 今月の既存カウント:', monthlyCount);
  
  // バックアップのカウント
  const monthlyBackupCount = {};
  members.forEach(name => {
    monthlyBackupCount[name] = 0;
  });
  
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const amBackup = backupAssignedData[dateStr + '_am'];
    if (amBackup && monthlyBackupCount[amBackup] !== undefined) {
      monthlyBackupCount[amBackup]++;
    }
  }
  
  let assigned = 0;
  let backupAssigned = 0;
  let skipped = 0;
  
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const date = new Date(currentYear, currentMonth - 1, day);
    const dayOfWeek = date.getDay();
    
    // 土日・祝日をスキップ
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const isHoliday = holidays[dateStr] || customHolidays.includes(dateStr);
    
    if (isWeekend || isHoliday) {
      console.log(`${dateStr}: 土日祝日のためスキップ`);
      skipped++;
      continue;
    }
    
    // AM
    if (!assignedData[dateStr + '_am']) {
      const member = selectBestMember(dateStr, 'am', monthlyCount);
      console.log(`${dateStr} AM: ${member}を選択`);
      if (member) {
        assignedData[dateStr + '_am'] = member;
        monthlyCount[member].am++;
        if (!yearlyTotals[member]) yearlyTotals[member] = { am: 0, pm: 0 };
        yearlyTotals[member].am++;
        assigned++;
      }
    }
    
    // PM
    if (!assignedData[dateStr + '_pm']) {
      const member = selectBestMember(dateStr, 'pm', monthlyCount);
      console.log(`${dateStr} PM: ${member}を選択`);
      if (member) {
        assignedData[dateStr + '_pm'] = member;
        monthlyCount[member].pm++;
        if (!yearlyTotals[member]) yearlyTotals[member] = { am: 0, pm: 0 };
        yearlyTotals[member].pm++;
        assigned++;
      }
    }
    
    // バックアップ担当（AMのみ）
    if (!backupAssignedData[dateStr + '_am']) {
      const backup = selectBestBackup(dateStr, monthlyBackupCount);
      console.log(`${dateStr} バックアップ: ${backup}を選択`);
      if (backup) {
        backupAssignedData[dateStr + '_am'] = backup;
        monthlyBackupCount[backup]++;
        backupAssigned++;
      }
    }
  }
  
  console.log('📊 今月の最終カウント:', monthlyCount);
  console.log(`✅ 自動割り振り完了: 担当${assigned}件、バックアップ${backupAssigned}件 (${skipped}日スキップ)`);
  
  await saveData();
  renderCalendar();
  updateCountTable();
  alert(`自動割り振り完了\n担当: ${assigned}件\nバックアップ: ${backupAssigned}件\n（土日祝日${skipped}日はスキップしました）`);
};

function selectBestMember(date, period, monthlyCount) {
  if (members.length === 0) {
    console.log('❌ メンバーが0人');
    return null;
  }
  
  const candidates = members.map(name => {
    const key = `${date}_${name}_${period}`;
    const preference = shiftData[key] || '';
    const totals = monthlyCount[name] || { am: 0, pm: 0 };
    
    // ×は除外、それ以外は全て選択可能
    const isAvailable = preference !== '×';
    
    return {
      name,
      isAvailable,
      preference,
      amTotal: totals.am,
      pmTotal: totals.pm,
      total: totals.am + totals.pm
    };
  });
  
  console.log(`${date} ${period} の候補:`, candidates);
  
  // ×でない人だけを候補にする
  const available = candidates.filter(c => c.isAvailable);
  
  if (available.length === 0) {
    console.log('  選択可能なメンバーなし（全員×）');
    return null;
  }
  
  // 完全公平：回数が最も少ない人を選ぶ
  available.sort((a, b) => {
    // 1. そのperiod（AM/PM）の回数が少ない人を最優先
    const aCount = period === 'am' ? a.amTotal : a.pmTotal;
    const bCount = period === 'am' ? b.amTotal : b.pmTotal;
    if (aCount !== bCount) return aCount - bCount;
    
    // 2. 合計回数が少ない人を次に優先
    if (a.total !== b.total) return a.total - b.total;
    
    // 3. 逆のperiodの回数も考慮（バランスを取る）
    const aOtherCount = period === 'am' ? a.pmTotal : a.amTotal;
    const bOtherCount = period === 'am' ? b.pmTotal : b.amTotal;
    if (aOtherCount !== bOtherCount) return aOtherCount - bOtherCount;
    
    // 4. それでも同じなら○を優先（微調整）
    if (a.preference === '○' && b.preference !== '○') return -1;
    if (a.preference !== '○' && b.preference === '○') return 1;
    
    return 0;
  });
  
  const selected = available[0];
  console.log(`  完全公平モードで選択: ${selected.name} (記号:${selected.preference || '空白'}, 今月AM:${selected.amTotal}, 今月PM:${selected.pmTotal}, 今月合計:${selected.total})`);
  return selected.name;
}

function selectBestBackup(date, monthlyBackupCount) {
  if (members.length === 0) {
    console.log('❌ メンバーが0人');
    return null;
  }
  
  // その日の担当者を除外
  const amAssigned = assignedData[date + '_am'];
  const pmAssigned = assignedData[date + '_pm'];
  
  const candidates = members.map(name => {
    // 担当者は除外
    if (name === amAssigned || name === pmAssigned) {
      return null;
    }
    
    const amKey = `${date}_${name}_am`;
    const pmKey = `${date}_${name}_pm`;
    const amPreference = shiftData[amKey] || '';
    const pmPreference = shiftData[pmKey] || '';
    
    // AM/PMどちらかが×でなければ選択可能（完全公平モード）
    const isAvailable = amPreference !== '×' || pmPreference !== '×';
    
    return {
      name,
      isAvailable,
      amPreference,
      pmPreference,
      backupCount: monthlyBackupCount[name] || 0
    };
  }).filter(c => c !== null && c.isAvailable);
  
  if (candidates.length === 0) {
    console.log('  バックアップ候補なし（全員×または担当者）');
    return null;
  }
  
  console.log(`${date} バックアップ候補:`, candidates);
  
  // 完全公平：バックアップ回数が最も少ない人を選ぶ
  candidates.sort((a, b) => {
    // 1. 今月のバックアップ回数が少ない人を優先
    if (a.backupCount !== b.backupCount) return a.backupCount - b.backupCount;
    
    // 2. それでも同じなら○がある人を優先（微調整）
    const aHasGood = a.amPreference === '○' || a.pmPreference === '○';
    const bHasGood = b.amPreference === '○' || b.pmPreference === '○';
    if (aHasGood && !bHasGood) return -1;
    if (!aHasGood && bHasGood) return 1;
    
    return 0;
  });
  
  const selected = candidates[0];
  console.log(`  完全公平モードでバックアップ選択: ${selected.name} (今月バックアップ${selected.backupCount}回)`);
  return selected.name;
}

function updateCountTable() {
  const tbody = document.getElementById('countTableBody');
  if (!tbody) {
    console.error('❌ countTableBodyが見つかりません');
    return;
  }
  
  console.log('📊 カウント表を更新', {
    メンバー数: members.length,
    年月: `${currentYear}年${currentMonth}月`
  });
  
  tbody.innerHTML = '';
  
  if (members.length === 0) {
    console.warn('⚠️ メンバーが0人です');
    return;
  }
  
  // 今月のカウントを計算
  const monthlyCount = {};
  members.forEach(name => {
    monthlyCount[name] = { am: 0, pm: 0, backup: 0 };
  });
  
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    
    const amAssigned = assignedData[dateStr + '_am'];
    const pmAssigned = assignedData[dateStr + '_pm'];
    const amBackup = backupAssignedData[dateStr + '_am'];
    const pmBackup = backupAssignedData[dateStr + '_pm'];
    
    if (amAssigned && monthlyCount[amAssigned]) {
      monthlyCount[amAssigned].am++;
    }
    if (pmAssigned && monthlyCount[pmAssigned]) {
      monthlyCount[pmAssigned].pm++;
    }
    if (amBackup && monthlyCount[amBackup]) {
      monthlyCount[amBackup].backup++;
    }
    if (pmBackup && monthlyCount[pmBackup]) {
      monthlyCount[pmBackup].backup++;
    }
  }
  
  // 累計：その年度の4月から表示中の月までの合計
  const cumulativeCount = {};
  members.forEach(name => {
    cumulativeCount[name] = { am: 0, pm: 0, backup: 0 };
  });
  
  // 年度の開始日を計算（その年度の4月1日）
  const fiscalYearStart = `${currentFiscalYear}-04-01`;
  
  // 表示中の月の年月文字列
  const currentMonthStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
  
  // assignedDataから年度開始以降、表示中の月までのデータをカウント
  Object.keys(assignedData).forEach(key => {
    const name = assignedData[key];
    if (!name) return;
    
    // keyの形式: "YYYY-MM-DD_am" または "YYYY-MM-DD_pm"
    const parts = key.split('_');
    const dateStr = parts[0];
    const period = parts[1];
    
    // 年度開始以降、かつ表示中の月以前かチェック
    if (dateStr >= fiscalYearStart && dateStr.substring(0, 7) <= currentMonthStr) {
      if (cumulativeCount[name]) {
        if (period === 'am') {
          cumulativeCount[name].am++;
        } else if (period === 'pm') {
          cumulativeCount[name].pm++;
        }
      }
    }
  });
  
  // backupAssignedDataから年度開始以降、表示中の月までのバックアップをカウント
  Object.keys(backupAssignedData).forEach(key => {
    const name = backupAssignedData[key];
    if (!name) return;
    
    // keyの形式: "YYYY-MM-DD_am" または "YYYY-MM-DD_pm"
    const parts = key.split('_');
    const dateStr = parts[0];
    
    // 年度開始以降、かつ表示中の月以前かチェック
    if (dateStr >= fiscalYearStart && dateStr.substring(0, 7) <= currentMonthStr) {
      if (cumulativeCount[name]) {
        cumulativeCount[name].backup++;
      }
    }
  });
  
  console.log('📊 今月カウント:', monthlyCount);
  console.log(`📊 ${currentFiscalYear}年度（${fiscalYearStart}～${currentMonthStr}）の累計:`, cumulativeCount);
  
  // テーブルに表示
  members.forEach(name => {
    const monthly = monthlyCount[name] || { am: 0, pm: 0, backup: 0 };
    const cumulative = cumulativeCount[name] || { am: 0, pm: 0, backup: 0 };
    
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight: bold;">${name}</td>
      <td style="background: #e3f2fd;">${monthly.am}</td>
      <td style="background: #e3f2fd;">${monthly.pm}</td>
      <td style="background: #bbdefb; font-weight: bold;">${monthly.am + monthly.pm}</td>
      <td style="background: #fff9c4;">${monthly.backup}</td>
      <td>${cumulative.am}</td>
      <td>${cumulative.pm}</td>
      <td style="font-weight: bold;">${cumulative.am + cumulative.pm}</td>
      <td style="background: #fff9c4;">${cumulative.backup}</td>
    `;
    tbody.appendChild(tr);
  });
  
  console.log('✅ カウント表更新完了');
}

window.copyScheduleToClipboard = async function() {
  const monthName = `${currentYear}年${currentMonth}月`;
  const daysInMonth = new Date(currentYear, currentMonth, 0).getDate();
  
  let text = `【${monthName} シフト担当表】\n\n`;
  text += `日付        | AM担当 | PM担当 | バックアップ\n`;
  text += `------------|--------|--------|-------------\n`;
  
  for (let day = 1; day <= daysInMonth; day++) {
    const dateStr = `${currentYear}-${String(currentMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
    const date = new Date(currentYear, currentMonth - 1, day);
    const dayOfWeek = date.getDay();
    const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
    
    // 土日・祝日チェック
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const isHoliday = holidays[dateStr] || customHolidays.includes(dateStr);
    
    if (isWeekend || isHoliday) {
      continue; // 土日祝日はスキップ
    }
    
    const amAssigned = assignedData[dateStr + '_am'] || '-';
    const pmAssigned = assignedData[dateStr + '_pm'] || '-';
    const backup = backupAssignedData[dateStr + '_am'] || '-';
    
    const dateDisplay = `${currentMonth}/${day}(${dayNames[dayOfWeek]})`;
    text += `${dateDisplay.padEnd(12, ' ')}| ${amAssigned.padEnd(6, ' ')} | ${pmAssigned.padEnd(6, ' ')} | ${backup}\n`;
  }
  
  text += `\n※土日祝日は除く\n`;
  
  try {
    await navigator.clipboard.writeText(text);
    alert('📧 担当表をクリップボードにコピーしました！\nメールに貼り付けてご利用ください。');
  } catch (err) {
    console.error('コピーに失敗:', err);
    // フォールバック：テキストエリアを使う方法
    const textarea = document.createElement('textarea');
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand('copy');
    document.body.removeChild(textarea);
    alert('📧 担当表をクリップボードにコピーしました！\nメールに貼り付けてご利用ください。');
  }
};

window.migrateTo2025 = async function() {
  if (!confirm('🔄 既存データを2025年度に移行します。\n\n【重要】この操作により：\n・現在のルート直下のデータが2025年度配下に移動します\n・ルート直下のデータは削除されます\n・この操作は1回だけ実行してください\n\n続けますか？')) {
    return;
  }
  
  try {
    console.log('🔄 データ移行開始...');
    updateSyncStatus('syncing');
    
    // 1. 既に2025年度のデータがあるかチェック
    const existing2025Snapshot = await get(ref(database, '/2025'));
    if (existing2025Snapshot.exists()) {
      if (!confirm('⚠️ 2025年度のデータが既に存在します。\n上書きしますか？')) {
        updateSyncStatus('success');
        return;
      }
    }
    
    // 2. ルート直下の既存データを読み込む
    console.log('📥 既存データを読み込み中...');
    const rootSnapshot = await get(ref(database, '/'));
    const rootData = rootSnapshot.val() || {};
    
    console.log('📊 読み込んだデータ:', {
      hasMembers: !!rootData.members,
      hasShiftData: !!rootData.shiftData,
      hasAssignedData: !!rootData.assignedData,
      hasBackupAssignedData: !!rootData.backupAssignedData
    });
    
    // 年度データ（2025, 2026等）は除外
    const legacyData = {};
    for (const key in rootData) {
      if (!key.match(/^20\d{2}$/)) { // 年度形式（2025, 2026等）でない場合のみコピー
        legacyData[key] = rootData[key];
      }
    }
    
    if (Object.keys(legacyData).length === 0) {
      alert('❌ 移行可能なデータが見つかりませんでした。\n既に移行済みの可能性があります。');
      updateSyncStatus('success');
      return;
    }
    
    console.log('📊 移行するデータ:', legacyData);
    
    // 3. 2025年度配下にデータをコピー
    console.log('💾 2025年度にデータをコピー中...');
    await set(ref(database, '/2025'), legacyData);
    
    console.log('✅ 2025年度にコピー完了');
    
    // 4. ルート直下の古いデータを削除
    console.log('🗑️ ルート直下の古いデータを削除中...');
    for (const key in legacyData) {
      await set(ref(database, `/${key}`), null);
    }
    
    console.log('✅ 古いデータ削除完了');
    
    // 5. データを再読み込み
    currentFiscalYear = 2025;
    document.getElementById('fiscalYearSelect').value = '2025';
    await loadData();
    setupRealtimeListeners();
    renderCalendar();
    renderMemberList();
    renderHolidayList();
    updateCountTable();
    
    updateSyncStatus('success');
    
    alert('✅ データ移行完了！\n\n既存データを2025年度に移行しました。\n年度選択で確認してください。');
    
    console.log('🎉 データ移行完了');
    
  } catch (error) {
    console.error('❌ データ移行エラー:', error);
    alert('❌ データ移行エラー:\n' + error.message + '\n\nFirebaseコンソールで手動移行をお試しください。');
    updateSyncStatus('error');
  }
};

window.resetData = async function() {
  if (!confirm('すべてのデータを削除しますか？この操作は取り消せません。')) return;
  
  const confirmText = prompt('本当に削除する場合は「削除」と入力してください');
  if (confirmText !== '削除') return;
  
  members = ["竹本", "村松", "冨樫", "米村", "大原", "大橋", "野々垣", "大川", "後閑", "内藤", "吉田", "藤井", "山崎"];
  shiftData = {};
  assignedData = {};
  backupAssignedData = {};
  yearlyTotals = {};
  customHolidays = [];
  
  await saveData();
  alert('データをリセットしました');
};
